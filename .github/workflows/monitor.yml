name: Twitter Monitor

on:
  schedule:
    # 避開整點高峰期，改在每小時的 23 分執行，以提高觸發率（UTC 時間）
    - cron: '23 * * * *'
  # 允許手動觸發（用於測試）
  workflow_dispatch:

# 需要寫入權限才能 commit last_seen.json
permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 從 GitHub Secret 還原 cookies.json
      - name: Restore Twitter cookies
        run: |
          echo "${{ secrets.TWITTER_COOKIES }}" | base64 -d > cookies.json
          echo "✅ cookies.json 已還原"

      - name: Run monitor
        env:
          WEBHOOK_ILLUSTRATORS:   ${{ secrets.WEBHOOK_ILLUSTRATORS }}
          WEBHOOK_VRC:            ${{ secrets.WEBHOOK_VRC }}
          WEBHOOK_VIDEO_CREATORS: ${{ secrets.WEBHOOK_VIDEO_CREATORS }}
          WEBHOOK_3D_MODELERS:    ${{ secrets.WEBHOOK_3D_MODELERS }}
          WEBHOOK_GRAPHIC_DESIGN: ${{ secrets.WEBHOOK_GRAPHIC_DESIGN }}
          WEBHOOK_PHOTOGRAPHY:    ${{ secrets.WEBHOOK_PHOTOGRAPHY }}
          WEBHOOK_AI_CREATORS:    ${{ secrets.WEBHOOK_AI_CREATORS }}
        run: python main.py

      # 把更新後的 last_seen.json 與 user_ids.json commit 回 repo
      - name: Save progress (commit states)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json user_ids.json
          # 只有在有變更時才 commit
          git diff --staged --quiet || git commit -m "chore: update state files [skip ci]"
          git push
